name: Publish to crates.io

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-22.04
    # Only run when Release succeeded and was triggered by a tag push.
    # `head_branch` on workflow_run carries the tag name for tag pushes.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify triggering ref is a version tag
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          if ! [[ "$TAG" =~ [0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Triggering ref ($TAG) is not a version tag."
            exit 1
          fi

      - name: Ensure commit is reachable from main
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          SHA="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Tag ${TAG} ($SHA) is not on main. Refusing to publish."
            exit 1
          fi

      - name: install native audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          # Allow tag formats like "1.0.0", "v1.0.0", or "concord-v1.0.0".
          TAG_VERSION="${TAG##*v}"
          TAG_VERSION="${TAG_VERSION##*-}"
          PKG_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "concord") | .version')
          echo "tag=$TAG tag_version=$TAG_VERSION pkg_version=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($PKG_VERSION)."
            exit 1
          fi

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
