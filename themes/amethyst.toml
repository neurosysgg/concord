# "Amethyst" — a purple/magenta example theme for Concord.
#
# One of two full-coverage examples in this repo: see `../theme.toml.example`
# for every Highlight Group at its built-in default with full explanatory
# comments; this file shows a from-scratch palette in practice.
#
# Rather than overriding every leaf group individually, this leans on the
# built-in `link` inheritance: overriding a handful of base groups (Muted,
# Border, FocusBorder, Selection, ActiveField, ...) cascades the palette to
# every group that links to them (dim text, borders, focus highlights, etc.)
# without repeating the same color a dozen times.
#
# Install: copy to your Concord config directory as `theme.toml` (same place
# as `config.toml`/`keymap.toml`).

# --- Core surfaces ---

[highlight.Normal]
foreground = "#FFFFFF"

[highlight.Muted]
foreground = "#808080"

[highlight.Border]
foreground = "#808080"

[highlight.FocusBorder]
foreground = "#9000FF" # purple accent

[highlight.ActiveField]
foreground = "#9000FF"
bold = true

[highlight.Selection]
foreground = "#9000FF"
background = "#2E0052" # darker purple from the accent

# --- Status colors ---

[highlight.Success]
foreground = "#00CA4E"

[highlight.Warning]
foreground = "#FFBD44"

[highlight.Error]
foreground = "#FF605C"

[highlight.Info]
foreground = "#2E0052"

# --- Mentions and reactions ---

[highlight.MentionSelf]
foreground = "#FFFFFF"
background = "#A80ECF" # magenta

[highlight.MentionOther]
foreground = "#D4B6DC" # light tint of MentionOther's background, for contrast
background = "#710C8A" # deeper magenta

[highlight.MentionPickerRole]
foreground = "#9B15BD"

[highlight.MentionBadge]
foreground = "#A80ECF"

[highlight.NavigationMentioned]
foreground = "#A80ECF"

[highlight.SelfReaction]
foreground = "#710C8A"

# --- Unread state ---

[highlight.UnreadDivider]
foreground = "#FF605C" # not distinct from Error here, on purpose

# --- Selected borders ---

[highlight.ForumSelectedBorder]
foreground = "#710C8A"

[highlight.MessageSelectedBorder]
foreground = "#9B15BD"

# --- Presence ---

[highlight.PresenceIdle]
foreground = "#FFBD44"
