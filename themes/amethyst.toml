# "Amethyst" — a purple/magenta example theme for Concord.
#
# One of two full-coverage examples in this repo: see `../theme.toml.example`
# for every field at its built-in default with full explanatory comments;
# this file shows the same field set customized into an actual palette, to
# demonstrate what a from-scratch theme looks like in practice.
#
# Install: copy to your Concord config directory as `theme.toml` (same place
# as `config.toml`/`keymap.toml`).

[theme]

# --- Core surfaces ---

text = "#FFFFFF"
accent = "#9000FF" # purple
dim = "#808080"
border = "#808080"
background = "#2E0052" # darker purple from accent
selection_bg = "#282D5A"

# --- Status colors ---

success = "#00CA4E"
warning = "#FFBD44"
error = "#FF605C"
info = "#2E0052"

# --- Discord-brand and Discord-specific accents ---

blurple = "#5865F2"
mention = "#A80ECF" # magenta
unread_badge = "#FF605C" # not distinct from `error` here, on purpose

# --- Message text highlights ---

mention_self_bg = "#A80ECF"
mention_other_bg = "#710C8A" # deeper magenta
mention_other_fg = "#D4B6DC" # light tint of mention_other_bg, for contrast
self_reaction = "#710C8A"

# --- Channel list / unread state ---

read_dim = "#828282"
unread_bright = "#FFFFFF"
scrollbar_thumb = "#AAAAAA"

# --- Panels and titles ---

active = "#00CA4E"
panel_title = "#FFFFFF"
selected_forum_post_border = "#710C8A"
selected_message_border = "#9B15BD" # magenta

# --- Presence ---

presence_idle = "#FFBD44"

# --- Fallback colors (used when Discord doesn't supply one) ---

mention_role_fallback = "#9B15BD"
dm_icon = "#9B15BD"
